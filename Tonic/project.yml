name: Tonic
options:
  bundleIdPrefix: com.tonic
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"

targets:
  Tonic:
    type: application
    platform: macOS
    sources:
      - path: Tonic
        excludes:
          - "**/*.xcassets"
          - "**/Info.plist"
          - "**/Info-Store.plist"
          - "**/*.entitlements"
          - ".build/**"
          - ".swiftpm/**"
          - "build/**"
          - ".flow/**"
          - "Package.swift"
          - "PrivilegedHelper/TonicHelperMain.swift"
          - "PrivilegedHelper/TonicHelperService.swift"
          - "PrivilegedHelper/com.saransh.tonic.helper.plist"
      - path: Assets.xcassets
        buildPhase: resources
    resources:
      - path: Tonic/Frameworks/Sparkle.zip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saransh.tonic
        INFOPLIST_FILE: Tonic/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tonic/Tonic.entitlements
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: CJ43UNM3AR
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: YES
        # Direct build ships un-sandboxed (like CleanMyMac/MacUpdater direct builds):
        # required for Homebrew upgrades, bundle replacement, and full-disk cleanup.
        # The Mac App Store build (TonicStore) remains fully sandboxed.
        ENABLE_APP_SANDBOX: NO
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 10
    entitlements:
      path: Tonic/Tonic.entitlements
    dependencies:
      - target: TonicHelper
        embed: false
    postBuildScripts:
      - name: Embed hardened privileged helper
        script: |
          set -euo pipefail
          HELPER_DIR="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/HelperTools"
          DAEMON_DIR="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          mkdir -p "$HELPER_DIR" "$DAEMON_DIR"
          ditto "$BUILT_PRODUCTS_DIR/com.saransh.tonic.helper" "$HELPER_DIR/com.saransh.tonic.helper"
          ditto "$SRCROOT/Tonic/PrivilegedHelper/com.saransh.tonic.helper.plist" "$DAEMON_DIR/com.saransh.tonic.helper.plist"
        basedOnDependencyAnalysis: false

  TonicStore:
    type: application
    platform: macOS
    sources:
      - path: Tonic
        excludes:
          - "**/*.xcassets"
          - "**/Info.plist"
          - "**/Info-Store.plist"
          - "**/*.entitlements"
          - ".build/**"
          - ".swiftpm/**"
          - "build/**"
          - ".flow/**"
          - "Package.swift"
          - "Utilities/SparkleUpdater.swift"
          - "Frameworks/Sparkle.zip"
          - "PrivilegedHelper/**"
          - "MenuBarManager/ScriptExecutionRuntime.swift"
          - "MenuBarManager/TonicExecutableProvider.swift"
      - path: Assets.xcassets
        buildPhase: resources
    resources:
      - path: Tonic/Info-Store.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saransh.tonic.store
        INFOPLIST_FILE: Tonic/Info-Store.plist
        CODE_SIGN_ENTITLEMENTS: Tonic/TonicStore.entitlements
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: CJ43UNM3AR
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_FILE_ACCESS_DOWNLOADS_FOLDER: readwrite
        ENABLE_USER_SELECTED_FILES: readwrite
        ENABLE_OUTGOING_NETWORK_CONNECTIONS: YES
        ENABLE_INCOMING_NETWORK_CONNECTIONS: NO
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 10
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) TONIC_STORE"
    entitlements:
      path: Tonic/TonicStore.entitlements

  TonicHelper:
    type: tool
    platform: macOS
    sources:
      - path: Tonic/PrivilegedHelper
        excludes:
          - "TonicHelperClient.swift"
          - "com.saransh.tonic.helper.plist"
      - path: Tonic/Services/SMCReader.swift
      - path: Tonic/Models/SensorsData.swift
    settings:
      base:
        PRODUCT_NAME: com.saransh.tonic.helper
        PRODUCT_BUNDLE_IDENTIFIER: com.saransh.tonic.helper
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) TONIC_HELPER"
        DEVELOPMENT_TEAM: CJ43UNM3AR
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        OTHER_CODE_SIGN_FLAGS: "--identifier com.saransh.tonic.helper"
        ENABLE_HARDENED_RUNTIME: YES

  TonicTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TonicTests
    dependencies:
      - target: Tonic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tonic.TonicTests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        # Must match the host app's team or the hardened-runtime app
        # refuses to dlopen the test bundle (different Team IDs).
        DEVELOPMENT_TEAM: CJ43UNM3AR
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

  TonicUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: TonicUITests
    dependencies:
      - target: Tonic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tonic.TonicUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Tonic
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: CJ43UNM3AR
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

schemes:
  Tonic:
    build:
      targets:
        Tonic: all
    test:
      targets:
        - TonicTests
  TonicUI:
    build:
      targets:
        Tonic: all
        TonicUITests: [test]
    test:
      targets:
        - TonicUITests
  TonicStore:
    build:
      targets:
        TonicStore: all
